<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIPEH — Iniciar Sesión</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/sipeh_estudiante.css" />
  </head>
  <body>
    <div id="screen-login">
      <div class="login-left">
        <div class="ll-logo">
          <div class="ll-icon">📅</div>
          <div class="ll-brand">SIP<span>EH</span></div>
          <div class="ll-tagline">Sistema de Programación<br />de Horarios</div>
        </div>
        <div class="ll-univ">
          <p>Universidad</p>
          <strong>El Bosque — Facultad de Ingeniería</strong>
        </div>
      </div>
      <div class="login-right">
        <div class="login-form">
          <div class="lf-title">Iniciar Sesión</div>
          <div class="lf-sub">Accede a tu cuenta de estudiante SIPEH</div>

          <label class="lf-label">Usuario o correo electrónico</label>
          <div class="lf-input-wrap">
            <span class="icon">👤</span>
            <input
              class="lf-input"
              type="email"
              placeholder="ejemplo@unbosque.edu.co"
              id="login-email"
              required
            />
          </div>

          <label class="lf-label">Contraseña</label>
          <div class="lf-input-wrap">
            <span class="icon">🔒</span>
            <input
              class="lf-input"
              type="password"
              placeholder="••••••"
              id="login-password"
              required
            />
            <button class="lf-eye" onclick="togglePasswordVisibility()">
              👁
            </button>
          </div>

          <div
            id="login-error"
            style="
              color: #e53e3e;
              font-size: 0.8rem;
              margin-bottom: 15px;
              display: none;
            "
          >
            Por favor, ingresa un correo válido y tu contraseña.
          </div>

          <div class="lf-remember">
            <input type="checkbox" id="remember" checked />
            <label for="remember">Recordar sesión</label>
          </div>

          <button class="lf-btn" onclick="handleLogin()">
            Iniciar Sesión →
          </button>

          <div class="lf-or">o</div>

          <button class="lf-ms" onclick="handleLogin()">
            <div class="ms-logo">
              <span style="background: #f25022"></span
              ><span style="background: #7fba00"></span>
              <span style="background: #00a4ef"></span
              ><span style="background: #ffb900"></span>
            </div>
            Acceder con Microsoft 365
          </button>

          <div class="lf-help" style="margin-top: 15px">
            ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
          </div>
          <div class="lf-help">
            ¿Necesitas ayuda? <a href="#">Contacta soporte técnico</a>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/sipeh_estudiante.js"></script>
  </body>
</html>
